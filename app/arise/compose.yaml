name: halo-canvas-phoenix

services:
  phoenix:
    image: docker.io/arizephoenix/phoenix:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    ports:
      # UI + OTLP HTTP collector (default Phoenix port)
      - 127.0.0.1:6006:6006
      # OTLP gRPC collector; host port 6007 because 4317 is taken locally
      - 127.0.0.1:6007:4317
    environment:
      PHOENIX_SQL_DATABASE_URL: postgresql://phoenix:phoenix@db:5432/phoenix
      PHOENIX_WORKING_DIR: /mnt/data
    volumes:
      - phoenix_data:/mnt/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:6006/healthz')\""]
      interval: 5s
      timeout: 5s
      retries: 24
      start_period: 10s

  db:
    image: docker.io/postgres:16
    restart: always
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix
      TZ: UTC
      PGTZ: UTC
    # Host port 5433 because 5432 is used by the local Langfuse stack
    ports:
      - 127.0.0.1:5433:5432
    volumes:
      - phoenix_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U phoenix -d phoenix"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  phoenix_data:
    driver: local
  phoenix_postgres_data:
    driver: local
